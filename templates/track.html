<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Journey</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .stage {
            padding: 20px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .stage-pending {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
        }
        .stage-active {
            background-color: #e7f5ff;
            border: 1px solid #339af0;
        }
        .stage-completed {
            background-color: #d3f9d8;
            border: 1px solid #51cf66;
        }
        .timeline-arrow {
            text-align: center;
            font-size: 24px;
            color: #adb5bd;
            margin: 10px 0;
        }
        .weather-info {
            background-color: #fff3bf;
            border: 1px solid #ffd43b;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .price-info {
            background-color: #f1f3f5;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .price-breakdown {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }
        .price-change {
            color: #2b8a3e;
            font-weight: bold;
        }
        .price-factor {
            margin-left: 15px;
            font-size: 0.9em;
            color: #495057;
        }
        .stage-price {
            font-size: 1.2em;
            font-weight: bold;
            color: #1864ab;
        }
    </style>
</head>
<body>
    <div id="template-data" style="display:none"
         data-stages='{{ stages|tojson|safe }}'
         data-product-id="{{ product_id or '' }}"
         data-journey='{{ journey|tojson|safe if journey is defined else "null" }}'></div>

    <div class="container mt-4">
        <h2>Product Journey</h2>
        <div id="product-details" class="mb-4">
            <!-- Product details will be inserted here -->
        </div>
        
        <div id="journey-timeline">
            <!-- Timeline will be inserted here -->
        </div>
    </div>

    <script>
        const templateData = document.getElementById('template-data');
        const STAGES = templateData ? JSON.parse(templateData.dataset.stages || '[]') : [];
        const SERVER_PRODUCT_ID = templateData ? (templateData.dataset.productId || null) : null;
        const SERVER_JOURNEY = templateData && templateData.dataset.journey && templateData.dataset.journey !== 'null'
            ? JSON.parse(templateData.dataset.journey)
            : null;

        function updateStageStatus(stages, currentStage) {
            stages.forEach(stage => {
                const stageIndex = STAGES.indexOf(stage.role);
                const currentIndex = STAGES.indexOf(currentStage);
                
                if (stageIndex < currentIndex) {
                    stage.status = 'completed';
                } else if (stageIndex === currentIndex) {
                    stage.status = 'active';
                } else {
                    stage.status = 'pending';
                }
            });
            return stages;
        }

        function formatTimestamp(timestamp) {
            return new Date(timestamp).toLocaleString();
        }

        function renderStage(stage) {
            let statusClass = '';
            switch(stage.status) {
                case 'completed':
                    statusClass = 'stage-completed';
                    break;
                case 'active':
                    statusClass = 'stage-active';
                    break;
                default:
                    statusClass = 'stage-pending';
            }

            let details = '';
            if (stage.details) {
                details = `
                    <div class="mt-2">
                        ${Object.entries(stage.details).map(([key, value]) => 
                            `<div><strong>${key}:</strong> ${value}</div>`
                        ).join('')}
                    </div>
                `;
            }

            let weatherInfo = '';
            if (stage.weather_data) {
                weatherInfo = `
                    <div class="weather-info">
                        <h6>Weather Conditions:</h6>
                        <div>Temperature: ${stage.weather_data.temperature}°C</div>
                        <div>Conditions: ${stage.weather_data.conditions}</div>
                        <div>Last Updated: ${stage.weather_data.timestamp}</div>
                    </div>
                `;
            }

                let priceInfo = '';
                if (stage.price_info) {
                    let priceHtml = `<div class="price-info"><h6>Price Information:</h6>`;
                    
                    if (stage.role === 'Farmer') {
                        priceHtml += `
                            <div class="stage-price">Base Price: $${stage.price_info.price_per_kg}/kg</div>
                            <div class="price-factor">Quality Factor: ${stage.price_info.calculation_details.quality_factor}x</div>
                            <div class="price-factor">Location Factor: ${stage.price_info.calculation_details.location_factor}x</div>
                            <div class="price-factor">Weather Impact: ${stage.price_info.calculation_details.weather_factor}x</div>
                            <div class="mt-2">Total Price: $${stage.price_info.total_price}</div>
                        `;
                    } else if (stage.role === 'Distributor') {
                        priceHtml += `
                            <div class="stage-price">Distributor Price: $${stage.price_info.price_per_kg}/kg</div>
                            <div class="price-factor">Original Price: $${stage.price_info.original_price}/kg</div>
                            <div class="price-factor">Transport Cost: +$${stage.price_info.transport_cost}/kg</div>
                            <div class="price-factor">Storage Cost: +$${stage.price_info.storage_cost}/kg</div>
                            <div class="price-factor">Markup: ${stage.price_info.markup_percentage}%</div>
                        `;
                    } else if (stage.role === 'Retailer') {
                        const retailPrice = stage.price_info.final_selling_price || stage.price_info.price_per_kg || 0;
                        const purchasePrice = stage.price_info.original_price || 0;
                        const markup = stage.price_info.markup_percentage || 0;
                        const additionalCosts = stage.price_info.additional_costs || 0;
                        const totalPrice = stage.price_info.total_price || retailPrice * (stage.details?.quantity || 1);

                        priceHtml += `
                            <div class="stage-price">Retail Price: $${retailPrice}/kg</div>
                            <div class="price-factor">Purchase Price: $${purchasePrice}/kg</div>
                            <div class="price-factor">Markup: ${markup}%</div>
                            <div class="price-factor">Additional Costs: +$${additionalCosts}/kg</div>
                            <div class="mt-2">Total Price: $${totalPrice}</div>
                        `;
                    }
                    
                    priceHtml += '</div>';
                    priceInfo = priceHtml;
                }            return `
                <div class="stage ${statusClass}">
                    <h5>${stage.role}</h5>
                    <div>Timestamp: ${formatTimestamp(stage.timestamp)}</div>
                    ${details}
                    ${weatherInfo}
                    ${priceInfo}
                    ${stage.estimated_delivery ? `
                        <div class="mt-2">
                            <strong>Estimated Delivery:</strong> ${stage.estimated_delivery.days} days
                            (${stage.estimated_delivery.hours} hours)
                        </div>
                    ` : ''}
                </div>
                ${stage.status !== 'pending' ? '<div class="timeline-arrow">↓</div>' : ''}
            `;
        }

        // Function to render journey (used for both server-side and API data)
        function renderJourney(journey, productId) {
            window.productJourney = journey; // Store journey data globally
            const currentStage = journey[journey.length - 1].role;
            const updatedJourney = updateStageStatus(journey, currentStage);
            
            const timeline = document.getElementById('journey-timeline');
            timeline.innerHTML = updatedJourney.map(stage => renderStage(stage)).join('');
            
            const details = document.getElementById('product-details');
            details.innerHTML = `
                <div class="alert alert-info">
                    <strong>Product ID:</strong> ${productId}<br>
                    <strong>Current Stage:</strong> ${currentStage}<br>
                    <strong>Started:</strong> ${formatTimestamp(journey[0].timestamp)}
                </div>
            `;
        }

        // Function to fetch and render product journey
        async function fetchProductJourney(productId) {
            try {
                const response = await fetch(`/api/track/${productId}`);
                const data = await response.json();
                const journey = data.journey || [];
                window.productJourney = journey; // Store journey data globally
                
                if (data.success && journey.length > 0) {
                    renderJourney(journey, data.product_id);
                } else {
                    document.getElementById('journey-timeline').innerHTML = `
                        <div class="alert alert-danger">
                            ${data.error || 'No journey details found for this Product ID.'}
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('journey-timeline').innerHTML = `
                    <div class="alert alert-danger">
                        Error loading product journey: ${error.message}
                    </div>
                `;
            }
        }

        // Get product ID from URL and fetch journey
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id') || SERVER_PRODUCT_ID;
        
        if (SERVER_JOURNEY && SERVER_JOURNEY.length > 0) {
            // Use server-side data
            window.productJourney = SERVER_JOURNEY;
            renderJourney(SERVER_JOURNEY, SERVER_PRODUCT_ID);
        } else if (productId) {
            // Fetch data via API
            fetchProductJourney(productId);
        } else {
            document.getElementById('journey-timeline').innerHTML = `
                <div class="alert alert-danger">
                    No Product ID supplied. Please use a valid QR code link.
                </div>
            `;
        }
    </script>
</body>
</html>
