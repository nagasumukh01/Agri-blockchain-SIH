<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retailer Portal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <h2 class="text-warning">🏪 Retailer Portal</h2>
  <form method="POST" class="mt-3">
    <div class="mb-3">
      <label class="form-label">Product ID (from Distributor's QR)</label>
      <input type="text" name="product_id" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Shop Name</label>
      <input type="text" name="shop" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Location</label>
      <select name="location" class="form-control" required>
        <option value="urban">Urban Center</option>
        <option value="suburban">Suburban Area</option>
        <option value="rural">Rural Area</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Selling Price per kg</label>
      <input type="number" step="0.01" name="price" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-warning">Process & Generate QR</button>
  </form>
  <a href="/chain" class="btn btn-link mt-3">View Blockchain</a>
</body>
</html>
